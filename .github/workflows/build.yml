# waas-images — GitHub Actions pipeline (GitHub is the canonical forge;
# .gitlab-ci.yml keeps working unchanged while both coexist).
#
# Static skeleton, dynamic content: the setup job runs
# ci/generate_pipeline.py (same discovery, toposort and validation as
# before the GitLab emitter was retired) and exposes one build matrix
# and one merge matrix per layer depth; the layer-N/merge-N jobs below
# consume them via fromJSON. A manifest that creates depth > 2 fails
# setup with an explicit message — add a layer-3/merge-3 pair here and
# bump GH_MAX_DEPTH in the generator.
#
# The heavy lifting stays in ci/*.sh (the portable layer, shared with
# GitLab): jobs export the CI_* variable names the scripts already
# read. Differences vs GitLab, both deliberate:
#   registry  build/merge happen entirely on GHCR (CI_REGISTRY_IMAGE,
#             ghcr.io/<owner>/<repo>, lowercased and computed by each
#             job itself via $GITHUB_ENV — NOT a setup-job output: a
#             job *output* gets silently blanked by GitHub if its value
#             contains any substring matching a registered secret
#             ("Skip output '...' since it may contain secret"), and
#             DOCKER_HUB_USERNAME matching part of the repo/org name is
#             an entirely plausible collision. $GITHUB_ENV never leaves
#             the job, so it isn't subject to that check) — CI-internal,
#             no pull limit, GITHUB_TOKEN pushes/pulls it without a
#             PAT. On the
#             default branch, ci/merge_image.sh mirrors the finished
#             <version> manifest list, once, to the PUBLIC registry
#             (CI_PUBLIC_REGISTRY_IMAGE, docker.io/<DOCKER_HUB_USERNAME>)
#             and cosign-signs that copy — see ci/build_image.sh and
#             ci/merge_image.sh headers for the full reasoning (GHCR's
#             no-default-visibility problem, Docker Hub's 200-pulls/6h
#             budget, why cross-registry `imagetools create` combine is
#             avoided (docker/buildx#1660) in favour of same-registry
#             assemble + single-source mirror). GitLab pushes to its
#             own registry — separate registries while the forges
#             coexist.
#   signing   cosign keyless OIDC (COSIGN_KEYLESS=1 + id-token: write)
#             instead of the COSIGN_PRIVATE_KEY key mode
#
# The buildkit layer cache lives in GitHub Actions' own cache service
# (--cache-to/from type=gha in ci/build_image.sh, exposed by
# crazy-max/ghaction-github-runtime below — the plain buildx CLI,
# unlike docker/build-push-action, does not pick up the GitHub cache
# endpoint on its own).
#
# arm64 legs run natively on ubuntu-24.04-arm (free for public repos).
# Fallback: set the repository variable WAAS_IMAGES_BUILD_STRATEGY=qemu
# to route every build to the amd64 fleet under emulation (same
# variable as GitLab; build_image.sh installs binfmt itself).
name: build

# Path-filtered: docs, examples/, the kasm catalog mapping and
# renovate.json don't feed the build in any way, so a push/PR touching
# only those doesn't need 15 images x 2 arches of build/scan/sign/push.
# Caveat: if this workflow is ever made a required status check, a PR
# that touches none of these paths won't trigger it, and the check will
# sit "expected" forever — either drop it from required checks or add a
# tiny always-run job GitHub can mark green instead.
on:
  push:
    branches: [main]
    paths: &build-relevant-paths
      - images.yaml
      - base/**
      - apps/**
      - desktop/**
      - ci/**
      - .github/workflows/build.yml
  pull_request:
    paths: *build-relevant-paths
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR: the CI-internal build/merge registry, see above
  id-token: write   # cosign keyless OIDC

env:
  WAAS_IMAGES_BUILD_STRATEGY: ${{ vars.WAAS_IMAGES_BUILD_STRATEGY || 'native' }}
  CI_REGISTRY: ghcr.io
  CI_REGISTRY_USER: ${{ github.actor }}
  CI_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  CI_PUBLIC_REGISTRY: docker.io
  CI_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
  CI_PUBLIC_REGISTRY_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
  CI_PUBLIC_REGISTRY_IMAGE: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}
  CI_COMMIT_SHA: ${{ github.sha }}
  CI_COMMIT_BRANCH: ${{ github.ref_name }}
  CI_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  CI_PROJECT_URL: ${{ github.server_url }}/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Materialise recipe Dockerfiles
        run: uv run ci/generate_pipeline.py >/dev/null
      # hadolint/hadolint has no ghcr.io mirror, so authenticate instead:
      # anonymous docker.io pulls share a rate-limit pool across every
      # concurrent GitHub-hosted runner worldwide, not just this repo's
      # traffic, and get exhausted by other tenants regardless of how
      # little this job pulls on its own.
      - name: docker login (docker.io, for the hadolint pull below)
        run: docker login -u "${CI_PUBLIC_REGISTRY_USER}" -p "${CI_PUBLIC_REGISTRY_PASSWORD}" "${CI_PUBLIC_REGISTRY}"
      - name: hadolint
        run: |
          # shellcheck disable=SC2046  # find-output splitting is deliberate (no spaces in repo paths), same as the GitLab job
          docker run --rm -v "$PWD:/mnt" -w /mnt hadolint/hadolint:2.12.0-alpine \
            hadolint --failure-threshold warning \
            $(find . -name Dockerfile -o -name Dockerfile.generated)
      - name: shellcheck
        run: shellcheck ci/*.sh base/*/rootfs/usr/local/bin/*
      - name: Catalog generator unit tests
        # --with = union of the PEP 723 deps of the ci/*.py scripts the
        # tests import (unittest discover has no script header of its own)
        run: uv run --with pyyaml==6.0.2 --with jsonschema==4.26.0 python -m unittest discover -s ci/tests -v

  setup:
    runs-on: ubuntu-24.04
    outputs:
      layer0: ${{ steps.matrices.outputs.layer0 }}
      layer1: ${{ steps.matrices.outputs.layer1 }}
      layer2: ${{ steps.matrices.outputs.layer2 }}
      merge0: ${{ steps.matrices.outputs.merge0 }}
      merge1: ${{ steps.matrices.outputs.merge1 }}
      merge2: ${{ steps.matrices.outputs.merge2 }}
      short_sha: ${{ steps.matrices.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Generate matrices
        id: matrices
        run: |
          uv run ci/generate_pipeline.py
          for key in layer0 layer1 layer2 merge0 merge1 merge2; do
            echo "${key}=$(jq -c ".${key}" github-matrices.json)" >> "$GITHUB_OUTPUT"
          done
          echo "short_sha=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

  layer-0:
    needs: [lint, setup]
    if: needs.setup.outputs.layer0 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer0) }}
    runs-on: ${{ matrix.runner }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
      IMG_BUILD_ARGS: ${{ matrix.IMG_BUILD_ARGS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_DOCKERFILE: ${{ matrix.IMG_DOCKERFILE }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
      SMOKE_PROFILE: ${{ matrix.SMOKE_PROFILE }}
      SMOKE_VNC: ${{ matrix.SMOKE_VNC }}
      SMOKE_RDP: ${{ matrix.SMOKE_RDP }}
      SMOKE_SSH: ${{ matrix.SMOKE_SSH }}
      SMOKE_AUDIO: ${{ matrix.SMOKE_AUDIO }}
      SMOKE_ENV: ${{ matrix.SMOKE_ENV }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Materialise recipe Dockerfiles
        run: uv run ci/generate_pipeline.py >/dev/null
      # buildx talks to the GHA cache service directly (--cache-to/from
      # type=gha in ci/build_image.sh); this just exposes the endpoint
      # + token the plain buildx CLI needs and can't discover on its own
      # (docker/build-push-action does this internally, we don't use it).
      - name: Expose GitHub Actions cache variables
        uses: crazy-max/ghaction-github-runtime@v4.0.0
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Build, smoke, push
        run: sh ci/build_image.sh

  # Deliberately outside build_image.sh and outside merge-0/catalog's
  # `needs:` — see ci/build_image.sh's header. Runs on ubuntu-24.04
  # regardless of the image's target arch: trivy only inspects the
  # already-pushed image's filesystem/packages remotely, it never
  # executes it natively.
  scan-0:
    needs: [setup, layer-0]
    if: needs.setup.outputs.layer0 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer0) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan
        run: sh ci/scan_image.sh

  sbom-0:
    needs: [setup, layer-0]
    if: needs.setup.outputs.layer0 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer0) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Generate SBOM (cyclonedx)
        run: sh ci/sbom_image.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.IMG_NAME }}-${{ strategy.job-index }}
          path: sbom.cdx.json
          retention-days: 90

  merge-0:
    needs: [setup, layer-0]
    if: needs.setup.outputs.merge0 != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.merge0) }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      COSIGN_KEYLESS: "1"
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCHS: ${{ matrix.IMG_ARCHS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Merge manifest list + sign
        run: sh ci/merge_image.sh

  layer-1:
    needs: [setup, layer-0]
    if: ${{ !cancelled() && needs.setup.outputs.layer1 != '[]' && (needs.layer-0.result == 'success' || needs.layer-0.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer1) }}
    runs-on: ${{ matrix.runner }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
      IMG_BUILD_ARGS: ${{ matrix.IMG_BUILD_ARGS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_DOCKERFILE: ${{ matrix.IMG_DOCKERFILE }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
      SMOKE_PROFILE: ${{ matrix.SMOKE_PROFILE }}
      SMOKE_VNC: ${{ matrix.SMOKE_VNC }}
      SMOKE_RDP: ${{ matrix.SMOKE_RDP }}
      SMOKE_SSH: ${{ matrix.SMOKE_SSH }}
      SMOKE_AUDIO: ${{ matrix.SMOKE_AUDIO }}
      SMOKE_ENV: ${{ matrix.SMOKE_ENV }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Materialise recipe Dockerfiles
        run: uv run ci/generate_pipeline.py >/dev/null
      # buildx talks to the GHA cache service directly (--cache-to/from
      # type=gha in ci/build_image.sh); this just exposes the endpoint
      # + token the plain buildx CLI needs and can't discover on its own
      # (docker/build-push-action does this internally, we don't use it).
      - name: Expose GitHub Actions cache variables
        uses: crazy-max/ghaction-github-runtime@v4.0.0
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Build, smoke, push
        run: sh ci/build_image.sh

  scan-1:
    needs: [setup, layer-1]
    if: needs.setup.outputs.layer1 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer1) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan
        run: sh ci/scan_image.sh

  sbom-1:
    needs: [setup, layer-1]
    if: needs.setup.outputs.layer1 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer1) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Generate SBOM (cyclonedx)
        run: sh ci/sbom_image.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.IMG_NAME }}-${{ strategy.job-index }}
          path: sbom.cdx.json
          retention-days: 90

  merge-1:
    needs: [setup, layer-1]
    if: ${{ !cancelled() && needs.setup.outputs.merge1 != '[]' && needs.layer-1.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.merge1) }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      COSIGN_KEYLESS: "1"
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCHS: ${{ matrix.IMG_ARCHS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Merge manifest list + sign
        run: sh ci/merge_image.sh

  layer-2:
    needs: [setup, layer-1]
    if: ${{ !cancelled() && needs.setup.outputs.layer2 != '[]' && (needs.layer-1.result == 'success' || needs.layer-1.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer2) }}
    runs-on: ${{ matrix.runner }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
      IMG_BUILD_ARGS: ${{ matrix.IMG_BUILD_ARGS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_DOCKERFILE: ${{ matrix.IMG_DOCKERFILE }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
      SMOKE_PROFILE: ${{ matrix.SMOKE_PROFILE }}
      SMOKE_VNC: ${{ matrix.SMOKE_VNC }}
      SMOKE_RDP: ${{ matrix.SMOKE_RDP }}
      SMOKE_SSH: ${{ matrix.SMOKE_SSH }}
      SMOKE_AUDIO: ${{ matrix.SMOKE_AUDIO }}
      SMOKE_ENV: ${{ matrix.SMOKE_ENV }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Materialise recipe Dockerfiles
        run: uv run ci/generate_pipeline.py >/dev/null
      # buildx talks to the GHA cache service directly (--cache-to/from
      # type=gha in ci/build_image.sh); this just exposes the endpoint
      # + token the plain buildx CLI needs and can't discover on its own
      # (docker/build-push-action does this internally, we don't use it).
      - name: Expose GitHub Actions cache variables
        uses: crazy-max/ghaction-github-runtime@v4.0.0
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Build, smoke, push
        run: sh ci/build_image.sh

  scan-2:
    needs: [setup, layer-2]
    if: needs.setup.outputs.layer2 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer2) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_CONTEXT: ${{ matrix.IMG_CONTEXT }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Trivy scan
        run: sh ci/scan_image.sh

  sbom-2:
    needs: [setup, layer-2]
    if: needs.setup.outputs.layer2 != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.layer2) }}
    runs-on: ubuntu-24.04
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCH: ${{ matrix.IMG_ARCH }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Generate SBOM (cyclonedx)
        run: sh ci/sbom_image.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.IMG_NAME }}-${{ strategy.job-index }}
          path: sbom.cdx.json
          retention-days: 90

  merge-2:
    needs: [setup, layer-2]
    if: ${{ !cancelled() && needs.setup.outputs.merge2 != '[]' && needs.layer-2.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.merge2) }}
    env:
      CI_COMMIT_SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
      COSIGN_KEYLESS: "1"
      IMG_NAME: ${{ matrix.IMG_NAME }}
      IMG_VERSION: ${{ matrix.IMG_VERSION }}
      IMG_ARCHS: ${{ matrix.IMG_ARCHS }}
      IMG_FROM_REF: ${{ matrix.IMG_FROM_REF }}
      IMG_OS: ${{ matrix.IMG_OS }}
      IMG_LAYER: ${{ matrix.IMG_LAYER }}
      IMG_DESCRIPTION: ${{ matrix.IMG_DESCRIPTION }}
      IMG_PROFILE: ${{ matrix.IMG_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute CI_REGISTRY_IMAGE (GHCR, lowercase)
        run: echo "CI_REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Merge manifest list + sign
        run: sh ci/merge_image.sh

  # Deliberately NOT gated on layer-N/merge-N succeeding: one broken
  # image used to veto catalog regeneration for the other 14 too (same
  # root cause as the scan-N/sbom-N split above). needs: still lists
  # them, only to wait for them to finish before ci/generate_catalog.py
  # checks the registry — the ACTUAL correctness gate now lives there,
  # per-image: it emits <version> only if that exact tag really got
  # published this run, and falls back to the last version that did
  # otherwise (see that script's docstring). lint/setup staying
  # required is a basic sanity floor (schema/manifest parsing must
  # work) — scan-N/sbom-N are, as above, absent from `needs:` entirely.
  # continue-on-error = allow_failure: the catalog is a secondary
  # deliverable, its failure never makes a green build look red. GitHub
  # has no Generic Package Registry — the stable-URL equivalent is the
  # rolling `catalog` release (fixed tag, assets overwritten in place
  # with --clobber, never pinned); the scheduled catalog-kasmweb.yml
  # workflow publishes its file to the same release.
  catalog:
    needs: [lint, setup, layer-0, layer-1, layer-2, merge-0, merge-1, merge-2]
    if: >-
      ${{ !cancelled()
          && github.ref_name == github.event.repository.default_branch
          && needs.lint.result == 'success'
          && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: write   # create the rolling release + upload its asset
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: docker login (docker.io, for the per-image publish check)
        run: docker login -u "${CI_PUBLIC_REGISTRY_USER}" -p "${CI_PUBLIC_REGISTRY_PASSWORD}" "${CI_PUBLIC_REGISTRY}"
      - name: Generate catalog-waas-images.yaml
        run: |
          uv run ci/generate_catalog.py
          uv run ci/validate_catalog.py catalog-waas-images.yaml
      - name: Publish to the rolling catalog release
        run: |
          gh release view catalog >/dev/null 2>&1 || \
            gh release create catalog --latest=false \
              --title "WaaS picker catalogs" \
              --notes "Rolling release holding the picker catalog files (README § Image catalogs). Assets are overwritten in place on every publication — always fetch, never pin."
          gh release upload catalog catalog-waas-images.yaml --clobber
      # Dev convenience: also keep a checked-in copy on main so the
      # catalog is diffable/browsable without hitting Releases. The
      # release asset above stays the source waas-fable actually
      # fetches — this commit is secondary, same continue-on-error
      # safety net as the rest of this job. checkout@v4 leaves HEAD
      # detached at github.sha, hence the explicit HEAD:main refspec.
      - name: Commit catalog-waas-images.yaml to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog-waas-images.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(catalog): regenerate catalog-waas-images.yaml [skip ci]"
          git push origin HEAD:main
