# recipe: consumer exercising the repo: key (third-party apt repo, the
# firefox pattern compiled from YAML). Google's deb ships a SETUID
# chrome-sandbox helper that the template's suid strip removes, and the
# pod seccomp profile blocks the user-namespace fallback — Chrome
# therefore launches with --no-sandbox: the pod (non-root, no caps,
# read-only, seccomp, NetworkPolicy) is the sandbox boundary, the exact
# trade-off already documented for Firefox in HARDENING.md § Known gaps.
name: chrome
layer: apps
description: >
  Google Chrome (dl.google.com APT repo, fingerprint pinned) in a
  single-app kiosk session — no desktop behind it; the pod is the
  sandbox boundary (inner Chrome sandbox disabled, Firefox-gap
  precedent).
version: "2.0.1"
from: core-ubuntu-noble
icon: google-chrome
# Catalog label (waas picker); the humanize fallback would say just
# "Chrome" — the product name is Google Chrome.
displayName: Google Chrome

# Google publishes no arm64 Chrome deb (dl.google.com Release still
# says "Architectures: amd64", re-checked 2026-07-17) — amd64 only.
archs: [linux/amd64]

recipe:
  apt: [google-chrome-stable]
  app: google-chrome-stable --no-sandbox
  repo:
    url: https://dl.google.com/linux/chrome/deb/
    keyUrl: https://dl.google.com/linux/linux_signing_key.pub
    # Primary key fingerprint, read from the live key on 2026-07-11.
    fingerprint: "EB4C1BFD4F042F6DDDCCEC917721F63BD38B4796"
    pin: "google-chrome*"

variants:
  - name: chrome
    smoke:
      vnc: true
