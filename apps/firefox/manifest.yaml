name: firefox
layer: apps
description: XFCE desktop with managed, policy-hardened Firefox.
version: "2.0.0"
from: core-ubuntu-noble-xfce
icon: firefox

# packages.mozilla.org has historically been amd64-first; arm64 stays off
# until the repo's arm64 debs are verified on the Turing Pi workers.
archs: [linux/amd64]

variants:
  - name: firefox
    smoke:
      vnc: true
      rdp: false
