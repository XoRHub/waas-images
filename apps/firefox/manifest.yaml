name: firefox
layer: apps
description: >
  Managed, policy-hardened Firefox in a single-app kiosk session — the
  browser fills the screen, no desktop behind it.
version: "2.0.1"
from: core-ubuntu-noble
icon: firefox

# packages.mozilla.org ships arm64 firefox debs (verified 2026-07-17,
# binary-arm64 Packages lists the same versions as amd64) — inherit the
# default amd64+arm64 matrix.

variants:
  - name: firefox
    smoke:
      vnc: true
      rdp: false
