# Two variants on purpose (devtools precedent): the standard build is
# the hardened catalog entry; hermes-agent-dev carries the documented
# reduced profile (HARDENING.md § Reduced profile) so the agent can
# `sudo apt install` the tools it decides it needs in-session —
# in-session installs land in the container layer and die with the pod,
# only /home/waas_user (and so ~/.hermes) survives.
name: hermes-agent
layer: apps
description: >
  Hermes Agent (Nous Research) with its web dashboard in a Firefox
  kiosk (chat TUI embedded) — self-improving AI agent; keys, sessions,
  memories and skills persist in ~/.hermes on the home volume, and mise
  installs extra toolchains there too, so they survive pod restarts.
version: "2.1.0"
from: core-ubuntu-noble
icon: hermes-agent

# Image-specific catalog env hint(s): variables this image honors that
# no protocol table (smoke:-derived) can surface. Root-level so both
# variants inherit; each conforms to the catalog EnvHint contract —
# name required, protocols optional and omitted here (this toggle is not
# protocol-gated). Merged on top of the smoke:-derived hints by
# ci/generate_catalog.py.
env:
  - name: WAAS_HERMES_DASHBOARD
    description: >-
      Serve the Hermes web dashboard in a Firefox kiosk (127.0.0.1:9119).
      Boolean '1'/'0'; set '0' to disable the server and fall back to the
      embedded chat TUI.
    default: "1"

variants:
  # Catalog labels (waas picker), per variant: keeps the hyphenated
  # product name and adds the profile suffix that disambiguates the
  # two variants sharing this base name.
  - name: hermes-agent
    displayName: Hermes-Agent (hardened)
    smoke:
      vnc: true

  - name: hermes-agent-dev
    displayName: Hermes-Agent (dev)
    profile: dev
    buildArgs:
      INSTALL_SUDO: "1"
    smoke:
      vnc: true
