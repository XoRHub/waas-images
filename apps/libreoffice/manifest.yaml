# First real consumer of the recipe: compiler — no Dockerfile in this
# directory: ci/recipe_compiler.py emits Dockerfile.generated from the
# block below (guards baked by the template).
name: ubuntu-libreoffice
layer: apps
description: >
  XFCE desktop with LibreOffice (Ubuntu main packages, no third-party
  repo), auto-started via XDG autostart.
version: "1.0.0"
from: ubuntu-xfce

recipe:
  apt: [libreoffice, libreoffice-gtk3]
  autostart: libreoffice

variants:
  - name: ubuntu-libreoffice
    smoke:
      vnc: true
