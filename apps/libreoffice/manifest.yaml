# First real consumer of the recipe: compiler — no Dockerfile in this
# directory: ci/recipe_compiler.py emits Dockerfile.generated from the
# block below (guards baked by the template).
name: libreoffice
layer: apps
description: >
  LibreOffice (Ubuntu main packages, no third-party repo) in a
  single-app kiosk session — no desktop behind it.
version: "2.0.1"
from: core-ubuntu-noble
icon: libreoffice
# Catalog label (waas picker): CamelCase branding the humanize
# fallback can't derive ("Libreoffice").
displayName: LibreOffice

recipe:
  apt: [libreoffice, libreoffice-gtk3]
  app: libreoffice

variants:
  - name: libreoffice
    smoke:
      vnc: true
