# Image manifest — discovered automatically by ci/generate_pipeline.py.
# One directory = one image family; each variant becomes one published
# image. Bump `version` on any change (tags are immutable, CI enforces it).
#
# The directory keeps its historical base/ubuntu name but the Dockerfile
# is OS-parameterized (ARG OS_BASE_IMAGE): the debian-* variants below
# build from the exact same file via images.yaml's os: map.
name: ubuntu-base
layer: base
description: >
  Headless apt-based graphical session (TigerVNC Xvnc + openbox
  fallback), VNC and optional xrdp bridge, PulseAudio for guacd's VNC
  audio stream, non-root, read-only-rootfs friendly.
version: "1.4.0"
# Picker icon (dashboard-icons slug; the plain "ubuntu"/"debian" slugs
# do not exist upstream — verified on the CDN, see README).
icon: ubuntu-linux

variants:
  # VNC-only: smallest image, the recommended default for Linux templates.
  - name: ubuntu-base-vnc
    buildArgs:
      INSTALL_RDP: "0"
    smoke:
      vnc: true
      rdp: false
      audio: true

  # xrdp baked in; runtime env decides which protocols are reachable.
  # Smoke-tested in RDP-only mode to prove that path independently.
  - name: ubuntu-base-rdp
    buildArgs:
      INSTALL_RDP: "1"
    smoke:
      vnc: false
      rdp: true
      audio: true
      env:
        WAAS_VNC_ENABLED: "0"
        WAAS_RDP_ENABLED: "1"

  # Debian 13 legs — deliberately base + desktop scope only; apps/ stays
  # Ubuntu until demand justifies doubling that part of the matrix.
  # Debian ships xrdp 0.10.x (vs 0.9.x on noble): the libvnc-backend
  # conf keys rendered by waas-entrypoint are covered by the RDP smoke.
  - name: debian-base-vnc
    os: debian-13
    icon: debian-linux
    buildArgs:
      INSTALL_RDP: "0"
    smoke:
      vnc: true
      rdp: false
      audio: true

  - name: debian-base-rdp
    os: debian-13
    icon: debian-linux
    buildArgs:
      INSTALL_RDP: "1"
    smoke:
      vnc: false
      rdp: true
      audio: true
      env:
        WAAS_VNC_ENABLED: "0"
        WAAS_RDP_ENABLED: "1"
