# Image manifest — discovered automatically by ci/generate_pipeline.py.
# One directory = one image family; each variant becomes one published
# image. Bump `version` on any change (tags are immutable, CI enforces it).
#
# The directory keeps its historical base/ubuntu name but the Dockerfile
# is OS-parameterized (ARG OS_BASE_IMAGE): the debian-* variants below
# build from the exact same file via images.yaml's os: map.
#
# core-*: internal build parents only — never published to
# catalog-waas-images.yaml (ci/generate_catalog.py skips any name
# starting with "core-"). They exist purely to be built FROM by the
# desktop layer.
name: ubuntu-core
layer: base
description: >
  Headless apt-based graphical session (TigerVNC Xvnc + openbox
  fallback), VNC and optional xrdp bridge + sshd, PulseAudio for
  guacd's VNC audio stream, non-root, read-only-rootfs friendly.
version: "1.0.0"
# Picker icon (dashboard-icons slug; the plain "ubuntu"/"debian" slugs
# do not exist upstream — verified on the CDN, see README). Unused for
# core-* (never catalogued) but kept as the manifest-level default any
# cataloged sibling would inherit.
icon: ubuntu-linux

variants:
  # VNC-only: smallest image, the parent for the apps/* desktop chain
  # (core-ubuntu-noble-xfce).
  - name: core-ubuntu-noble
    buildArgs:
      INSTALL_RDP: "0"
      INSTALL_SSH: "0"
    smoke:
      vnc: true
      rdp: false
      audio: true

  # xrdp + sshd baked in; runtime env decides which protocols are
  # reachable. The parent for the catalogued *-desktop-* "OS complete"
  # images — never used by apps/*.
  - name: core-ubuntu-noble-full
    buildArgs:
      INSTALL_RDP: "1"
      INSTALL_SSH: "1"
    smoke:
      vnc: false
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_VNC_ENABLED: "0"
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"

  # Debian 13 legs — deliberately base + desktop scope only; apps/ stays
  # Ubuntu until demand justifies doubling that part of the matrix.
  # Debian ships xrdp 0.10.x (vs 0.9.x on noble): the libvnc-backend
  # conf keys rendered by waas-entrypoint are covered by the RDP smoke.
  - name: core-debian-13
    os: debian-13
    icon: debian-linux
    buildArgs:
      INSTALL_RDP: "0"
      INSTALL_SSH: "0"
    smoke:
      vnc: true
      rdp: false
      audio: true

  - name: core-debian-13-full
    os: debian-13
    icon: debian-linux
    buildArgs:
      INSTALL_RDP: "1"
      INSTALL_SSH: "1"
    smoke:
      vnc: false
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_VNC_ENABLED: "0"
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"
