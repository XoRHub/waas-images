; waas supervisord — runs unprivileged, everything mutable under the
; runtime dir, all service logs multiplexed to container stdout.
[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
pidfile=%(ENV_WAAS_RUNTIME_DIR)s/supervisord.pid

[unix_http_server]
file=%(ENV_WAAS_RUNTIME_DIR)s/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix://%(ENV_WAAS_RUNTIME_DIR)s/supervisor.sock

; Program fragments are rendered by waas-entrypoint according to the
; runtime env (which protocols are enabled, resolution, ...).
[include]
files = %(ENV_WAAS_RUNTIME_DIR)s/supervisor.d/*.conf
