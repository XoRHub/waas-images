apiVersion: waas.xorhub.io/catalog/v1
images:
- image: docker.io/xorhub/chrome:2.0.0
  os: linux
  app: chrome
  version: 2.0.0
  icon: google-chrome
  displayName: XFCE desktop with Google Chrome (dl.google.com APT repo, fingerprint pinned),…
  architectures:
  - amd64
  profile: hardened
  recommended:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    volumes:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    env:
    - name: WAAS_AUDIO_ENABLED
      description: Enable the unprivileged PulseAudio daemon (native protocol on TCP 4713, consumed by guacd's VNC client)
        — boolean '0'/'1'.
      protocols:
      - vnc
      default: '1'
- image: docker.io/xorhub/debian-desktop-13:2.0.0
  os: linux
  app: debian-desktop-13
  version: 2.0.0
  icon: debian-linux
  displayName: XFCE desktop, VNC + RDP + SSH, derived from the apt core-full image.
  architectures:
  - amd64
  - arm64
  profile: hardened
  recommended:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    volumes:
    - name: tmp
      mountPath: /tmp
    - name: run
      mountPath: /run
    env:
    - name: WAAS_RDP_ENABLED
      description: Enable xrdp — boolean '0'/'1'. Requires the image to have been built with INSTALL_RDP=1 (OS-only images
        only); no relevant runtime default to advertise here.
      protocols:
      - rdp
    - name: WAAS_RDP_AUTH_ENABLED
      description: Require the RDP client to present the session password. Baked true; an explicit runtime false opts out
        and logs a warning — never a build-time toggle.
      protocols:
      - rdp
      default: 'true'
    - name: WAAS_SSH_ENABLED
      description: Enable sshd (publickey only) — boolean '0'/'1'.
      protocols:
      - ssh
      default: '0'
      requires:
      - WAAS_SSH_AUTHORIZED_KEYS_FILE
    - name: WAAS_SSH_AUTHORIZED_KEYS_FILE
      description: 'Path to the authorized public key — mount from a Secret (valueFrom.secretKeyRef), never a literal value.
        Required as soon as WAAS_SSH_ENABLED=1: the entrypoint refuses to start otherwise (fail-closed by design).'
      protocols:
      - ssh
    - name: WAAS_AUDIO_ENABLED
      description: Enable the unprivileged PulseAudio daemon (native protocol on TCP 4713, consumed by guacd's VNC client)
        — boolean '0'/'1'.
      protocols:
      - vnc
      default: '1'
