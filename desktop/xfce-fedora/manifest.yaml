name: fedora-desktop
layer: desktop
os: fedora-43
description: XFCE desktop on Fedora, VNC + RDP + SSH, derived from core-fedora-43-full.
version: "2.0.0"
from: core-fedora-43-full
icon: fedora

variants:
  - name: fedora-desktop-43
    smoke:
      vnc: true
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"
