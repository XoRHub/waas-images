name: fedora-xfce
layer: desktop
os: fedora-43
description: XFCE desktop on Fedora, VNC + RDP, derived from fedora-base-rdp.
version: "1.1.0"
from: fedora-base-rdp
icon: fedora

variants:
  - name: fedora-xfce
    buildArgs:
      INSTALL_SSH: "1"
    smoke:
      vnc: true
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"
