name: ubuntu-desktop
layer: desktop
description: XFCE desktop, VNC + RDP + SSH, derived from the apt core-full image.
version: "1.0.0"
from: core-ubuntu-noble-full
# No "xfce" slug in dashboard-icons — the OS icon is the best fit.
icon: ubuntu-linux

variants:
  - name: ubuntu-desktop-noble
    smoke:
      vnc: true
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"

  # Debian 13 leg: same Dockerfile, parent switched to the debian core.
  - name: debian-desktop-13
    os: debian-13
    from: core-debian-13-full
    icon: debian-linux
    smoke:
      vnc: true
      rdp: true
      ssh: true
      audio: true
      env:
        WAAS_RDP_ENABLED: "1"
        WAAS_SSH_ENABLED: "1"
        WAAS_SSH_AUTHORIZED_KEYS: "smoke-placeholder-not-a-real-key"

  # VNC-only desktop, the parent for every apps/* image: no xrdp, no
  # sshd baked in at all (built from the VNC-only core, not core-full)
  # — RDP/SSH are structurally absent here, not merely disabled,
  # because an image dedicated to a single app may only ever activate
  # VNC. Still "core-" prefixed and therefore never catalogued.
  - name: core-ubuntu-noble-xfce
    from: core-ubuntu-noble
    smoke:
      vnc: true
      rdp: false
      audio: true
