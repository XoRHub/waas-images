# WorkspaceTemplate consuming a waas-images build — the full integration
# contract in one example.
#
# Credentials: none needed. When a template exposes vnc/rdp without an
# explicit password source, the platform generates a random per-workspace
# password, injects it into the pod (VNC_PW via secretKeyRef) and
# resolves it server-side at connect time — zero template configuration.
# For a persistent/known secret instead, set
# `protocols[].credentialsSecretRef` + env `valueFrom.secretKeyRef` (see
# workspacetemplate-dev-ssh.yaml for the full pattern).
apiVersion: waas.xorhub.io/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: ubuntu-xfce
spec:
  displayName: "Ubuntu 24.04 — XFCE"
  description: "Full XFCE desktop over VNC (recommended protocol for Linux)."
  os: linux
  # Pin the digest (or at least the immutable semver tag) — never a
  # mutable tag; ArgoCD-friendly.
  image: registry.example.com/waas/waas-images/ubuntu-xfce:1.0.0
  # 5901 = VNC (default; guacd protocol "vnc"). Set 3389 + WAAS_RDP_ENABLED
  # to probe/connect over RDP instead.
  port: 5901
  homeSize: 10Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: "2", memory: 4Gi }
  env:
    - name: VNC_RESOLUTION
      value: "1920x1080"
  # Optional: opt this OS-only image into SSH (built with INSTALL_SSH=1;
  # off by default even then — README § "Contract with the Workspace
  # CR"). There is no auto-generated SSH credential, so an authorized
  # key must come from an externally-provisioned Secret, same pattern as
  # workspacetemplate-dev-ssh.yaml:
  #   env:
  #     - name: WAAS_SSH_ENABLED
  #       value: "1"
  #     - name: WAAS_SSH_AUTHORIZED_KEYS
  #       valueFrom:
  #         secretKeyRef: { name: xfce-ssh-credentials, key: authorized-keys }
  #   protocols:
  #     - name: ssh
  #       port: 2222
  #       credentialsSecretRef: xfce-ssh-credentials
  #     - name: vnc
  #       port: 5901
