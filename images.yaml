# Global build configuration. Per-image config lives in each directory's
# manifest.yaml (base/*, desktop/*, apps/*) and is discovered
# automatically — adding an image means adding a directory, not editing
# this file.
#
# ci/generate_pipeline.py merges this with the discovered manifests and
# emits the GitHub Actions build matrices (topologically ordered on `from`).

# Base OS matrix. Manifests (or individual variants) reference an entry
# via `os:`; the buildArgs feed the parameterized FROM of the apt base
# Dockerfile (base/ubuntu — historical name kept, it builds Debian too;
# Fedora, dnf-based, has its own tree under base/fedora).
#
# Key convention: Ubuntu uses its codename (image names are
# core-ubuntu-noble, not core-ubuntu-24.04); Debian/Fedora use their
# numeric version (no widely-recognized codename convention there).
os:
  ubuntu-noble:
    buildArgs:
      OS_BASE_IMAGE: "ubuntu:24.04"
  debian-13:
    buildArgs:
      OS_BASE_IMAGE: "debian:13-slim"
  fedora-43:
    buildArgs:
      OS_BASE_IMAGE: "fedora:43"

defaults:
  os: ubuntu-noble
  # amd64 mandatory (worker), arm64 for the Turing Pi control-plane-adjacent
  # nodes. Manifests can restrict (see apps/firefox).
  archs: [linux/amd64, linux/arm64]
  # Fixed identity baked into every image; must match the operator's
  # /home/waas_user mount and the recommended pod fsGroup.
  buildArgs:
    WAAS_UID: "1000"
    WAAS_GID: "1000"

scan:
  # Trivy gate: fail the pipeline on these severities. This is the
  # actual source ci/scan_image.sh runs with — ci/generate_pipeline.py
  # reads it into github-matrices.json's "scan" key, the setup job
  # re-exposes it as outputs, and every scan-N job sets TRIVY_SEVERITY/
  # TRIVY_IGNORE_UNFIXED from those before calling ci/scan_image.sh.
  # TRIVY_EXIT_CODE has no config here (still CI-variable-only, see
  # that script) since there's no per-pipeline reason to ever change it.
  severity: HIGH,CRITICAL
  ignoreUnfixed: true
