# Hand-curated mapping of the upstream docker.io/kasmweb/* images WaaS
# consumes (referenced today in waas gitops/governance/images.yaml).
# NOT images this repo builds: kasm/ sits deliberately outside the
# base/desktop/apps build layers and generate_pipeline.py never reads it.
#
# ci/generate_kasm_catalog.py (scheduled pipeline, README § Image
# catalogs) resolves the newest X.Y.Z release tag per image from Docker
# Hub and publishes catalog-kasmweb.yaml; the full-catalog CLI mode
# never writes back here, but `generate_kasm_catalog.py <name>` (the
# single-image mode) DOES append a minimal name/app/knownVersion block
# below if <name> isn't listed yet — as plain text, never a full
# yaml.safe_load/dump, so it can't strip these comments. Fill in
# icon/displayName by hand afterward if wanted. knownVersion is only
# the offline fallback when Docker Hub is unreachable — refresh it
# occasionally, it does not need to track every Kasm release.
#
# description: optional free text. Emitted as-is when present; if
# omitted, a description the published catalog already carried is kept,
# never erased (ci/generate_kasm_catalog.py catalog()).
#
# icon: dashboard-icons slug (github.com/homarr-labs/dashboard-icons).
# Verify https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/<slug>.svg
# answers 200 before committing — an invalid slug fails nothing here,
# WaaS just falls back to a generic OS icon silently.
#
# architectures/profile/recommended are NOT hand-curated here anymore —
# ci/generate_kasm_catalog.py derives architectures from Docker Hub's
# per-tag manifest-list data (hub_architectures()) and profile/
# recommended from an actual hardening probe (ci/probe_kasm_hardening.sh,
# --probe-hardening only). A hand-curated architectures: field used to
# live here and drifted stale (claimed amd64-only when kasmweb's plain
# X.Y.Z tags are actually multi-arch) — don't reintroduce it.
images:
  - name: terminal            # docker.io/kasmweb/terminal
    app: terminal
    icon: terminal            # no gnome-terminal slug upstream; terminal exists
    displayName: "Kasm Terminal"
    knownVersion: "1.19.0"

  - name: firefox
    app: firefox
    icon: firefox
    displayName: "Kasm Firefox"
    knownVersion: "1.19.0"

  - name: doom            # docker.io/kasmweb/doom
    app: doom
    knownVersion: "1.19.0"
