# Hand-curated mapping of the upstream docker.io/kasmweb/* images WaaS
# consumes (referenced today in waas gitops/governance/images.yaml).
# NOT images this repo builds: kasm/ sits deliberately outside the
# base/desktop/apps build layers and generate_pipeline.py never reads it.
#
# ci/generate_kasm_catalog.py (scheduled pipeline, README § Image
# catalogs) resolves the newest X.Y.Z release tag per image from Docker
# Hub and publishes catalog-kasmweb.yaml; it NEVER writes back here.
# knownVersion is only the offline fallback when Docker Hub is
# unreachable — refresh it occasionally, it does not need to track
# every Kasm release.
#
# icon: dashboard-icons slug (github.com/homarr-labs/dashboard-icons).
# Verify https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/<slug>.svg
# answers 200 before committing — an invalid slug fails nothing here,
# WaaS just falls back to a generic OS icon silently.
#
# architectures: hand-curated like the rest of this file — kasmweb's
# plain X.Y.Z release tags (the only tags this catalog emits) are
# amd64-only manifests; their arm64 builds live on separate suffixed
# tags. Omit the key if genuinely unknown: WaaS treats absent as
# "unknown" and falls back to the entry-level spec.architectures hint.
images:
  - name: terminal            # docker.io/kasmweb/terminal
    app: terminal
    icon: terminal            # no gnome-terminal slug upstream; terminal exists
    displayName: "Kasm Terminal"
    knownVersion: "1.19.0"
    architectures: [amd64]

  - name: firefox
    app: firefox
    icon: firefox
    displayName: "Kasm Firefox"
    knownVersion: "1.19.0"
    architectures: [amd64]
